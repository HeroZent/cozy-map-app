<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%"   stop-color="#1a2248"/>
      <stop offset="100%" stop-color="#0a0e22"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#f4c97a" stop-opacity="0.9"/>
      <stop offset="50%"  stop-color="#f4c97a" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#f4c97a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- background rounded square -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- subtle inner frame -->
  <rect x="18" y="18" width="476" height="476" rx="92"
        fill="none" stroke="rgba(244,201,122,0.08)" stroke-width="2"/>

  <!-- "s" letterform -->
  <text
    x="72" y="360"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="320"
    font-weight="400"
    fill="#f4c97a"
  >s</text>

  <!-- glow halo -->
  <circle cx="384" cy="342" r="62" fill="url(#glow)"/>
  <!-- dot -->
  <circle cx="384" cy="342" r="22" fill="#f4c97a"/>
</svg>
