<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <radialGradient id="dotGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#f4c97a" stop-opacity="1"/>
      <stop offset="45%"  stop-color="#f4c97a" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#f4c97a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- wordmark -->
  <text
    x="16" y="88"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="88"
    font-weight="400"
    letter-spacing="-2"
    fill="#f4c97a"
  >sulat</text>

  <!-- glow halo behind dot -->
  <circle cx="369" cy="86" r="22" fill="url(#dotGlow)"/>
  <!-- solid dot -->
  <circle cx="369" cy="86" r="8" fill="#f4c97a"/>
</svg>
