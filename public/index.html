<!DOCTYPE html>
<html lang="%LANG_ISO_CODE%">
  <head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Sulat — drop a thought on the map</title>

    <!-- Open Graph -->
    <meta property="og:title" content="Sulat — drop a thought on the map" />
    <meta property="og:description" content="An anonymous cozy map for sharing thoughts, memories, and feelings pinned to real places." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://sulat.vercel.app" />
    <meta name="description" content="An anonymous cozy map for sharing thoughts, memories, and feelings pinned to real places." />

    <!-- Handwritten fonts via Google Fonts CDN — keeps them out of the JS bundle -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Caveat:wght@400&family=Dancing+Script:wght@400&family=Kalam:wght@400&family=Patrick+Hand&family=Reenie+Beanie&display=swap"
      rel="stylesheet"
    />

    <!-- The `react-native-web` recommended style reset: https://necolas.github.io/react-native-web/docs/setup/#root-element -->
    <style id="expo-reset">
      /* These styles make the body full-height */
      html,
      body {
        height: 100%;
      }
      /* These styles disable body scrolling if you are using <ScrollView> */
      body {
        overflow: hidden;
      }
      /* These styles make the root element full-height */
      #root {
        display: flex;
        height: 100%;
        flex: 1;
      }
    </style>
  </head>

  <body>
    <!-- Use static rendering with Expo Router to support running without JavaScript. -->
    <noscript>
      You need to enable JavaScript to run this app.
    </noscript>
    <!-- The root element for your Expo app. -->
    <div id="root"></div>
  </body>
</html>
